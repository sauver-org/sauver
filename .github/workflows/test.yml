name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-install:
    name: Install script
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run install tests
        run: bash tests/test-install.sh

  test-install-macos:
    name: Install script (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run install tests
        run: bash tests/test-install.sh
